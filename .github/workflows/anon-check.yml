name: anon-check

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for personal identifiers
        shell: bash
        run: |
          set -u
          # Detect personal identifiers that must not appear in public repos.
          # Word-boundaries avoid false positives (aria-hidden, remark-gfm, etc).
          # Personal handles / hosts / org names that must never appear in source.
          # `aria` / `ark` use a negative lookahead so common HTML attrs (aria-label,
          # markdown libs like remark-* / spark-*) don't false-positive.
          # Note: generic words like `user` / `cpc` are NOT in the pattern — they
          # collide with HTTP role names (`role: 'user'`), CSS (`user-select`), and
          # this project's internal URL scheme (`cpc-file://`).
          PATTERN='(?i)(\b(araya|okg|okajima|tsukasa|haven|tail662202)\b|com\.okg\.|com\.haven\.|\baria\b(?!-)|\bark\b(?!-))'

          matches=$(grep -rEnP \
              --exclude-dir=.git \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=build \
              --exclude-dir=.venv \
              --exclude-dir=venv \
              --exclude-dir=__pycache__ \
              --exclude-dir=.next \
              --exclude='*.lock' \
              --exclude='package-lock.json' \
              --exclude='yarn.lock' \
              --exclude='*.min.js' \
              --exclude='*.png' \
              --exclude='*.jpg' \
              --exclude='*.ico' \
              --exclude='anon-check.yml' \
              --exclude='LICENSE' \
              "$PATTERN" . || true)

          if [ -n "$matches" ]; then
            echo "$matches"
            echo ""
            echo "::error::Personal identifiers detected. Remove or move to gitignored config."
            exit 1
          fi

          echo "OK: no personal identifiers found"
